<!DOCTYPE html>
<!-- HTML5 Document Type Declaration - Defines this as an HTML5 document -->
<html lang="en">
  <!-- Root HTML element with language attribute set to English -->

  <head>
    <!-- Document head section containing metadata and external resources -->

    <!-- Character encoding declaration - Ensures proper text rendering -->
    <meta charset="UTF-8" />

    <!-- Favicon link - Uses Vite's default SVG icon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Viewport meta tag - Ensures responsive design on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page title - Appears in browser tab and search results -->
    <title>LinkedIn Web Crawler - Frontend Interface</title>

    <!-- Meta description for SEO - Describes the application's purpose -->
    <meta name="description" content="Web interface for LinkedIn profile and company data extraction tool" />

    <!-- Additional meta tags for better SEO and social sharing -->
    <meta name="keywords" content="LinkedIn, web crawler, data extraction, React, Vite" />
    <meta name="author" content="Kartik Gurnani" />

    <!-- Open Graph meta tags for social media sharing -->
    <meta property="og:title" content="LinkedIn Web Crawler" />
    <meta property="og:description" content="Extract publicly available LinkedIn profile data" />
    <meta property="og:type" content="website" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#1e40af" />
  </head>

  <body>
    <!-- Main document body -->

    <!-- Root div where React application will be mounted -->
    <!-- This is the entry point for the React app - all components render here -->
    <div id="root"></div>

    <!-- Main JavaScript module - Entry point for the Vite-built application -->
    <!-- This script loads and executes the React application -->
    <script type="module" src="/src/main.jsx"></script>
  </body>

</html>
