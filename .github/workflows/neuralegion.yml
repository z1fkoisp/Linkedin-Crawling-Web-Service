name: NeuraLegion
'on':
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  schedule:
  - cron: 37 5 * * 3
jobs:
  neuralegion_scan:
    runs-on: ubuntu-latest
    name: A job to run a Nexploit scan
    steps:
    - uses: actions/checkout@v4
    - name: "Start Nexploit Scan \U0001F3C1"
      id: start
      uses: NeuraLegion/run-scan@29ebd17b4fd6292ce7a238a59401668953b37fbe
      with:
        api_token: ${{ secrets.NEURALEGION_TOKEN }}
        name: GitHub scan ${{ github.sha }}
        discovery_types: '[ "crawler" ]

          '
        crawler_urls: "[ \"https://brokencrystals.com\" ] # \u270F\uFE0F Update this\
          \ to the url you wish to scan\n"
